<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ander 4 Eber</title>

<style>
body {
    margin: 0;
    color: white;
    text-align: center;
    font-family: Arial, sans-serif;
    overflow-x: hidden;
}

/* 📼 Pantalla VHS */
.vhs-loader {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
    z-index: 9999;
    animation: apagar 2.5s forwards;
}

@keyframes apagar {
    0% { opacity: 1; }
    80% { opacity: 1; }
    100% { opacity: 0; visibility: hidden; }
}

/* 🎬 Fondo cinematográfico */
body::before {
    content: "";
    position: fixed;
    top: -5%;
    left: -5%;
    width: 110%;
    height: 110%;
    background: url("casa.jpg") center/cover no-repeat;
    filter: blur(6px) brightness(0.35);
    z-index: -2;
    transition: transform 0.2s ease-out;
}

/* 📺 Ruido VHS */
body::after {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: url("https://grainy-gradients.vercel.app/noise.svg");
    opacity: 0.15;
    z-index: -1;
}

/* ⭐ Logo flotante */
.logo img {
    width: 80%;
    max-width: 420px;
    margin-top: 80px;
    margin-bottom: 40px;
    animation: flotar 4s ease-in-out infinite;
    filter: drop-shadow(0 0 35px rgba(255,255,255,0.8))
            drop-shadow(0 0 55px rgba(255,0,0,0.7));
}

@keyframes flotar {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
    100% { transform: translateY(0px); }
}

/* ⚡ Glitch */
.glitch { animation: glitch 0.3s; }
@keyframes glitch {
    20% { transform: translate(-3px,2px); }
    40% { transform: translate(3px,-2px); }
    60% { transform: translate(-2px,1px); }
    80% { transform: translate(2px,-1px); }
}

/* 📺 Menú */
.menu {
    display: flex;
    flex-direction: column;
    gap: 25px;
    align-items: center;
}

/* 🎮 Botones capítulos */
.boton {
    background: rgba(0,0,0,0.75);
    color: white;
    padding: 20px 40px;
    text-decoration: none;
    font-size: 22px;
    width: 320px;
    border: 1px solid #444;
    backdrop-filter: blur(4px);
    transition: 0.3s;
}

.boton:hover { background: red; }

/* 🌭 Botón apoyo */
.apoyo {
    margin-top: 30px;
    background: #ffcc00;
    color: black;
    padding: 12px 20px;
    text-decoration: none;
    border-radius: 8px;
    font-weight: bold;
}

/* 📞 Footer */
.footer {
    margin-top: 80px;
    font-size: 14px;
}

.footer a {
    color: #ffcc00;
    text-decoration: none;
    margin: 0 10px;
    font-size: 18px;
}
</style>
</head>

<body>

<div class="vhs-loader">📼 PLAY</div>

<div class="logo">
    <img src="logo.png" alt="Ander 4 Eber">
</div>

<div class="menu">
    <a class="boton" href="torneo de luchitas 2006/index.html">1 — Torneo de Luchitas 2006</a>
    <a class="boton" href="comic2.html">2 — Briss X-Press</a>

    <a class="apoyo" href="apoya.html">🌭 Invita una salchicha Wilson a Eber</a>
</div>

<div class="footer">
    <a href="https://instagram.com/ander4eber" target="_blank">📸 Instagram</a>
    <a href="mailto:cristianatlante@gmail.com">✉️ Mail</a>
    <a href="https://wa.me/542235127083" target="_blank">📱 WhatsApp</a>
</div>

<audio id="vhsSound">
    <source src="https://archive.org/download/vhs-startup/VHS%20Startup.mp3" type="audio/mp3">
</audio>

<script>
/* 🎬 Movimiento fondo real */
document.addEventListener("mousemove", e => {
    const x = (e.clientX / window.innerWidth - 0.5) * 15;
    const y = (e.clientY / window.innerHeight - 0.5) * 15;
    document.body.style.transform = `translate(${x}px, ${y}px)`;
});

/* ⚡ Glitch ocasional */
setInterval(() => {
    const logo = document.querySelector(".logo img");
    logo.classList.add("glitch");
    setTimeout(() => logo.classList.remove("glitch"), 300);
}, 6000 + Math.random()*5000);

/* 📼 Sonido en cada click */
document.addEventListener("click", () => {
    const sonido = document.getElementById("vhsSound");
    sonido.currentTime = 0;
    sonido.play();
});
</script>

</body>
</html>
